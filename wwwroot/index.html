<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>BookkeepingBlazor</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BookkeepingBlazor.styles.css" rel="stylesheet" />
</head>

<body>
    <script src="gesture-helper.js"></script>

    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>

    <script>
        window.authHelper = {
            getHashValue: function () { return window.location.hash; },
            clearHash: function () { history.replaceState(null, "", window.location.pathname + window.location.search); },
            setItem: (key, value) => localStorage.setItem(key, value),
            getItem: (key) => localStorage.getItem(key),
            removeItem: (key) => localStorage.removeItem(key)
        };
    </script>
</body>

</html>
